name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: fdfece8b5c135c21fa630440b8dbf2e4
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Check Cloudflare token
        id: cloudflare-token
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Set the CLOUDFLARE_API_TOKEN repository secret to enable automatic Cloudflare deploys."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.cloudflare-token.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.cloudflare-token.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.cloudflare-token.outputs.configured == 'true'
        run: npm ci

      - name: Deploy
        if: steps.cloudflare-token.outputs.configured == 'true'
        run: npm run deploy
